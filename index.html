<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Icons -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <!-- Viewport: no zoom, full screen feel -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- PWA / home screen -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Floppy Ball" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="A golf-themed Flappy Bird clone for mobile browsers. Tap to keep the ball in the air, clear the flag poles, and chase the global leaderboard."
    />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Floppy Ball" />
    <meta
      property="og:description"
      content="A golf-themed Flappy Bird clone for mobile browsers. Tap to keep the ball in the air, clear the flag poles, and chase the global leaderboard."
    />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Floppy Ball logo with a flying golf ball bird and golf course background." />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Floppy Ball" />
    <meta
      name="twitter:description"
      content="A golf-themed Flappy Bird clone for mobile browsers. Tap to keep the ball in the air, clear the flag poles, and chase the global leaderboard."
    />
    <meta name="twitter:image" content="/og-image.png" />
    <meta name="twitter:image:alt" content="Floppy Ball logo with a flying golf ball bird and golf course background." />

    <!-- Prevent iOS callouts and selection on tap -->
    <meta name="format-detection" content="telephone=no" />

    <title>Floppy Ball</title>

    <style>
      * { -webkit-tap-highlight-color: transparent; }
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        touch-action: none;
      }
      #root {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
